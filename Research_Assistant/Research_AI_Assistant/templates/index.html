{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRAIN - AI Research &amp; Citation Assistant</title>
    {% csrf_token %}
    <script>
      // Get CSRF token for AJAX requests
      const csrfToken = document.querySelector(
        "[name=csrfmiddlewaretoken]",
      ).value;
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
  </head>
  <body class="app-body">
    {% csrf_token %}
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-container">
        <!-- Title -->
        <div class="navbar-title">
          <div class="logo">
            <span class="logo-text">B</span>
          </div>
          <div>
            <h1 class="app-title">BRAIN</h1>
            <p class="app-subtitle">AI RESEARCH &amp; CITATION ASSISTANT</p>
          </div>
        </div>

        <!-- User Profile -->
        <div class="profile-section">
          <button onclick="toggleProfileDropdown()" class="profile-button">
            <div class="profile-avatar">S</div>
            <div class="profile-info">
              <p class="profile-name">Silver</p>
              <p class="profile-role">Premium Researcher</p>
            </div>
            <i class="fa-solid fa-chevron-down profile-chevron"></i>
          </button>

          <!-- Dropdown -->
          <div id="profileDropdown" class="profile-dropdown">
            <a onclick="logout()" class="profile-logout">
              <i class="fa-solid fa-arrow-right-from-bracket logout-icon"></i>
              <span>Log out</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div class="nav-spacer"></div>

    <div class="main-container">
      <!-- HERO INPUT WITH INTEGRATED FILTERS -->
      <div class="hero-section">
        <div class="hero-container">
          <div class="hero-label">
            <i class="fa-solid fa-brain"></i>
            <span>ASK BRAIN ANYTHING</span>
          </div>

          <!-- Main Search Container -->
          <div class="search-card">
            <div class="search-input-section">
              <input
                id="queryInput"
                type="text"
                placeholder="What breakthrough in quantum computing happened in the last 5 years?"
                class="search-input"
              />

              <button onclick="performSearch()" class="search-button">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>RESEARCH</span>
              </button>
            </div>

            <div class="filters-section">
              <div class="filters-container">
                <div class="year-range">
                  <label class="filter-label">YEAR FILTER</label>
                  <div class="year-slider-single">
                    <div class="slider-labels">
                      <span>1990</span>
                      <span>2026</span>
                    </div>
                    <div class="slider-container">
                      <input
                        type="range"
                        id="yearFilter"
                        min="1990"
                        max="2026"
                        value="2026"
                        oninput="updateYearLabel()"
                        class="year-slider"
                      />
                      <div id="sliderTooltip" class="slider-tooltip">2026</div>
                    </div>
                    <div class="slider-description">
                      Show papers published up to
                      <span id="yearValue">2026</span>
                    </div>
                  </div>
                </div>

                <div class="filter-dropdown">
                  <label class="filter-label">SEARCH BY</label>
                  <select id="searchBy" class="filter-select">
                    <option value="relevance">Relevance</option>
                    <option value="open_access">Open Access</option>
                    <option value="best_match" selected>Best Match</option>
                  </select>
                </div>

                <div class="filter-dropdown">
                  <label class="filter-label"
                    >Number of Papers (Default:5)</label
                  >
                  <select id="quota" class="filter-select">
                    <option value="5" selected>5 papers</option>
                    <option value="10">10 papers</option>
                    <option value="15">15 papers</option>
                    <option value="20">20 papers</option>
                  </select>
                </div>

                <div>
                  <button onclick="resetFilters()" class="reset-button">
                    RESET
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="binders-section">
        <div class="binders-header">
          <div class="binders-title">
            <h2>Your Research Binders</h2>
            <div id="binderCount" class="binder-count">0 active</div>
          </div>
        </div>

        <div id="bindersContainer" class="binders-container">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <div
      id="modalOverlay"
      onclick="if (event.target.id === 'modalOverlay') closeModal();"
      class="modal-overlay"
    >
      <div onclick="event.stopImmediatePropagation()" class="modal">
        <div class="modal-header">
          <div class="modal-title-section">
            <div id="modalBinderColor" class="modal-binder-color"></div>
            <input
              id="modalBinderName"
              onblur="saveModalName()"
              class="modal-title-input"
            />
          </div>

          <div class="modal-close-section">
            <button onclick="closeModal()" class="modal-close-button">✕</button>
          </div>
        </div>

        <div class="modal-content">
          <div id="modalChatContainer" class="modal-chat"></div>
        </div>

        <div class="modal-footer">
          <div class="modal-input-section">
            <input
              id="modal-input"
              type="text"
              placeholder="Continue your research... (Enter to send)"
              class="modal-input"
            />
            <button id="modal-send-btn" class="modal-send-button">
              <i class="fa-solid fa-paper-plane"></i>
              <span>Send</span>
            </button>
          </div>
          <div class="modal-footer-text">BRAIN AI Research Assistant</div>
        </div>
        <div id="sourcesPanel" class="sources-panel">
          <h3 class="sources-title">Sources from OpenAlex</h3>
          <div id="sourcesList" class="sources-list"></div>
        </div>
      </div>
    </div>

    <!-- FULL-SCREEN RESEARCH VIEW -->
    <div id="researchView" class="research-view">
      <!-- Top Bar -->
      <div class="research-top-bar">
        <div class="research-top-left">
          <button id="researchBackBtn" class="research-back-btn">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <div id="researchQuery" class="research-query"></div>
        </div>
        <div class="research-top-right">
          <button
            id="saveToBinderBtn"
            class="save-to-binder-btn"
            style="display: none"
          >
            <i class="fa-solid fa-bookmark"></i>
            <span>Save to Binder</span>
          </button>
        </div>
      </div>

      <!-- Chat/Response Area -->
      <div class="research-chat-area">
        <div id="researchChatContainer" class="research-chat-container"></div>

        <!-- Load More Button Container -->
        <div
          id="loadMoreContainer"
          class="load-more-container"
          style="display: none"
        >
          <button id="loadMoreBtn" class="load-more-btn">
            <i class="fa-solid fa-plus-circle"></i>
            <span>Load More Papers</span>
          </button>
          <div id="loadMoreStatus" class="load-more-status"></div>
        </div>
      </div>

      <!-- Bottom Input Bar -->
      <div class="research-input-bar">
        <div class="research-input-section">
          <input
            id="research-input"
            type="text"
            placeholder="Ask follow-up questions... (Enter to send)"
            class="research-input"
          />
          <button id="research-send-btn" class="research-send-button">
            <i class="fa-solid fa-paper-plane"></i>
            <span>Send</span>
          </button>
        </div>
      </div>
    </div>

    <script src="{% static 'scripts.js' %}?v=20260318-1"></script>
    <script>
      // Simple console test for load more functionality
      console.log(
        '� To test load more: search for "machine learning" with 5 papers, then check for load more button',
      );
      console.log(
        "💡 If button doesn't appear, run: testLoadMore() in console",
      );

      function testLoadMore() {
        console.log("🧪 Testing load more button...");
        const container = document.getElementById("loadMoreContainer");
        const btn = document.getElementById("loadMoreBtn");

        console.log("Container found:", !!container);
        console.log("Button found:", !!btn);
        console.log("AppState:", window.appState);

        if (window.appState) {
          console.log("Next cursor:", window.appState.nextCursor);
          console.log("Total count:", window.appState.totalCount);
          console.log("Is loading more:", window.appState.isLoadingMore);
        }

        if (
          (container && !container.style.display) ||
          container.style.display === "none"
        ) {
          container.style.display = "flex";
          console.log("✅ Forced container to show");
        }
      }

      window.testLoadMore = testLoadMore;
    </script>
  </body>
</html>
